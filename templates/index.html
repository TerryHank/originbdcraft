<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeadCraft - Perler Bead Pattern Generator</title>
  <link rel="stylesheet" href="/static/style.css?v=14">
</head>
<body>

  <!-- Header -->
  <header class="header" style="display: none;">
    <a class="header-logo" href="/">BeadCraft</a>
    <div class="header-right">
      <div class="lang-switcher">
        <button class="lang-btn active" data-lang="zh" onclick="setLanguage('zh')">CN</button>
        <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
      </div>
      <a class="header-link" href="/docs" target="_blank" data-i18n="header.api_docs">API Docs</a>
    </div>
  </header>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Main Layout -->
  <div class="main-container">

    <!-- Left Panel -->
    <div class="left-panel">

      <!-- Example Images Gallery -->
      <div class="section examples-section">
        <div class="section-title" data-i18n="examples.title">Example Images</div>
        <div class="examples-gallery">
          <div class="example-item" onclick="loadExampleImage('luoxiaohei')">
            <img src="/examples/luoxiaohei_thumb.png" alt="Luo Xiaohei" class="example-thumb">
            <div class="example-name">Luo Xiaohei</div>
          </div>
          <div class="example-item" onclick="loadExampleImage('meili')">
            <img src="/examples/meili_thumb.png" alt="Meili" class="example-thumb">
            <div class="example-name">Meili</div>
          </div>
          <div class="example-item" onclick="loadExampleImage('pony')">
            <img src="/examples/pony_thumb.png" alt="Pony" class="example-thumb">
            <div class="example-name">Pony</div>
          </div>
          <div class="example-item" onclick="loadExampleImage('usachi')">
            <img src="/examples/usachi_thumb.png" alt="Usachi" class="example-thumb">
            <div class="example-name">Usachi</div>
          </div>
        </div>
      </div>

      <!-- Settings Panel -->
      <div id="settings-panel" style="display: none;">

        <!-- Palette Preset -->
        <div class="section" style="border-top: none; padding-top: 12px;">
          <div class="section-title" data-i18n="settings.palette_preset">Palette Preset</div>
          <div class="preset-group">
            <button class="preset-btn" data-preset="96" onclick="setPreset('96')">96</button>
            <button class="preset-btn" data-preset="120" onclick="setPreset('120')">120</button>
            <button class="preset-btn" data-preset="144" onclick="setPreset('144')">144</button>
            <button class="preset-btn" data-preset="168" onclick="setPreset('168')">168</button>
            <button class="preset-btn active" data-preset="221" onclick="setPreset('221')">221</button>
          </div>
        </div>

        <!-- Grid Size -->
        <div class="section">
          <div class="section-title" data-i18n="settings.board_size">Bead Board Size</div>

          <div class="radio-group" style="margin-bottom: 12px;">
            <label class="radio-item">
              <input type="radio" name="grid-mode" value="fixed" checked onchange="setGridMode('fixed')">
              <span>难度</span>
            </label>
            <label class="radio-item">
              <input type="radio" name="grid-mode" value="pixel" onchange="setGridMode('pixel')">
              <span data-i18n="settings.pixel_block">Pixel Block Size</span>
            </label>
          </div>

          <div id="grid-fixed-options">
            <select id="grid-size-select">
              <option value="simple">简单 (1/4)</option>
              <option value="normal" selected>普通 (1/2)</option>
              <option value="hard">困难 (原始)</option>
            </select>
          </div>

          <div id="grid-pixel-options" style="display: none;">
            <label class="form-label">
              <span data-i18n="settings.pixel_block_label">Pixel block size:</span> <span id="pixel-size-value">8px</span>
            </label>
            <input type="range" id="pixel-size-slider" min="4" max="32" value="8" step="1">
          </div>
        </div>

        <!-- Background Removal -->
        <div class="section">
          <div class="section-title" data-i18n="settings.bg_removal">Background Removal</div>
          <label class="checkbox-item">
            <input type="checkbox" id="remove-bg-checkbox">
            <span data-i18n="settings.auto_remove_bg">Auto remove background</span>
          </label>
          <div class="form-hint" data-i18n="settings.bg_hint">Detects the dominant border color and flood-fills it as transparent.</div>
        </div>

      </div>
    </div>

    <!-- Right Panel -->
    <div class="right-panel">

      <!-- Result Area -->
      <div id="result-area" style="width: 100%; max-width: 640px;">

        <!-- Canvas Toolbar -->
        <div class="canvas-toolbar">
          <button id="edit-toggle" class="toggle-btn" onclick="toggleEditMode()" data-i18n="btn.edit">Edit</button>
          <div style="flex: 1;"></div>
          <button id="clear-btn" class="toolbar-btn" onclick="clearCanvas()" title="清除">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
          <button id="upload-btn" class="toolbar-btn" onclick="document.getElementById('file-input').click()" title="上传">
            <span class="toolbar-btn-icon">+</span>
          </button>
          <input type="file" id="file-input" class="hidden-input" accept="image/jpeg,image/png,image/gif,image/webp">
          <select id="led-matrix-size" class="led-size-btn" onchange="updateLedSizeDisplay()">
            <option value="16">16</option>
            <option value="32">32</option>
            <option value="52">52</option>
            <option value="64" selected>64</option>
          </select>
          <button class="toolbar-btn" onclick="showSerialSettings()" title="设置">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
        </div>

        <!-- Canvas Container with Empty State -->
        <div class="canvas-container" style="margin: 0 auto;">
          <!-- Empty State (default) -->
          <div id="empty-state" class="empty-state">
            <div class="empty-state-icon">&#9638;</div>
            <div class="empty-state-text" data-i18n="result.empty">Upload an image and generate a pattern</div>
          </div>
          <!-- Pattern Canvas (after generate) -->
          <canvas id="pattern-canvas" style="display: none;"></canvas>
        </div>

        <!-- Color Panel -->
        <div class="color-panel" id="color-panel" style="display: none;">
          <div class="color-panel-title" data-i18n="result.colors_used">Colors Used</div>
          <div id="color-list" class="color-list"></div>
          <div id="color-total" class="color-total"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="/static/i18n.js?v=41"></script>
  <script src="/static/app.js?v=41"></script>

  <!-- Serial Port Dialog (Settings) -->
  <div id="serial-settings-dialog" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>设置</h3>
        <button class="modal-close" onclick="hideSerialSettings()">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Connection Mode -->
        <div class="form-group">
          <label class="form-label">连接模式：</label>
          <div class="mode-toggle">
            <button class="mode-btn active" onclick="setConnectionMode('serial')">串口</button>
            <button class="mode-btn" onclick="setConnectionMode('ble')">蓝牙</button>
          </div>
        </div>
        
        <!-- Serial Port Selection (default) -->
        <div id="serial-settings" class="connection-settings">
          <div class="form-group">
            <label class="form-label">串口：</label>
            <select id="serial-port-select">
              <option value="">扫描中...</option>
            </select>
            <button class="btn btn-small" onclick="refreshSerialPorts()">刷新</button>
          </div>
          <div class="form-group">
            <label class="form-label">波特率：</label>
            <select id="serial-baud-select">
              <option value="115200">115200</option>
              <option value="230400">230400</option>
              <option value="460800" selected>460800</option>
              <option value="921600">921600</option>
            </select>
          </div>
        </div>
        
        <!-- BLE Device Selection (hidden by default) -->
        <div id="ble-settings" class="connection-settings" style="display: none;">
          <div class="form-group">
            <label class="form-label">蓝牙设备：</label>
            <select id="ble-device-select">
              <option value="">扫描中...</option>
            </select>
            <button class="btn btn-small" onclick="refreshBLEDevices()">刷新</button>
          </div>
        </div>
        
        <!-- Background Color -->
        <div class="form-group">
          <label class="form-label">背景色（透明区域）：</label>
          <input type="color" id="serial-bg-color" value="#000000">
        </div>
        
        <!-- Action Buttons -->
        <div class="form-group" style="border-top: 1px solid #ddd; padding-top: 15px; margin-top: 15px;">
          <label class="form-label">操作：</label>
          <div style="display: flex; flex-wrap: wrap; gap: 8px;">
            <button class="btn btn-primary" onclick="sendToESP32Direct(); hideSerialSettings();">发送到ESP32</button>
            <button class="btn btn-secondary" onclick="exportPNG()">导出PNG</button>
            <button class="btn btn-secondary" onclick="exportPDF()">导出PDF</button>
            <button class="btn btn-secondary" onclick="exportJSON()">导出JSON</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="hideSerialSettings()">关闭</button>
      </div>
    </div>
  </div>
  
  <!-- Serial Status Toast -->
  <div id="serial-toast" class="serial-toast" style="display: none;"></div>
  
  <!-- Image Crop Dialog -->
  <div id="crop-dialog" class="modal" style="display: none;">
    <div class="modal-content" style="width: auto; max-width: 80vw; max-height: 85vh;">
      <div class="modal-header">
        <h3>裁剪图像</h3>
        <button class="modal-close" onclick="cancelCrop()">&times;</button>
      </div>
      <div class="modal-body" style="padding: 10px; display: flex; justify-content: center; align-items: center; overflow: auto;">
        <div id="crop-container" style="position: relative; display: inline-block;">
          <img id="crop-image" style="max-width: 100%; max-height: 70vh; display: block;">
          <div id="crop-box" style="position: absolute; border: 2px dashed #fff; box-shadow: 0 0 0 9999px rgba(0,0,0,0.5); cursor: move;"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="cancelCrop()">取消</button>
        <button class="btn btn-primary" onclick="confirmCrop()">确认裁剪</button>
      </div>
    </div>
  </div>
</body>
</html>
